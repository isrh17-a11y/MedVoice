<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedVoice — Your Health Report, in Plain Words</title>
  <meta name="description" content="MedVoice simplifies complex medical reports into plain spoken audio for elderly patients." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #1a7a6e;
      --primary-light: #e8f5f3;
      --primary-dark: #0f5c52;
      --warning: #f59e0b;
      --danger: #ef4444;
      --success: #22c55e;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
      --surface: #f9fafb;
      --white: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      line-height: 1.6;
      color: var(--text);
      background: var(--surface);
      padding: 40px 16px 80px;
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
    }

    /* Header */
    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
    }

    .header p {
      color: var(--muted);
      margin-top: 6px;
    }

    /* Cards */
    .card {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed var(--primary);
      border-radius: 8px;
      padding: 32px;
      text-align: center;
      cursor: pointer;
      transition: background 0.2s;
    }

    .drop-zone:hover, .drop-zone.drag-over {
      background: var(--primary-light);
    }

    .drop-zone .drop-icon {
      font-size: 40px;
      display: block;
      margin-bottom: 8px;
    }

    .drop-zone .drop-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
    }

    .drop-zone .drop-sub {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    .drop-zone .file-name {
      margin-top: 10px;
      font-size: 15px;
      color: var(--primary);
      font-weight: 500;
    }

    #file-input { display: none; }

    /* Divider */
    .divider {
      text-align: center;
      color: var(--muted);
      margin: 16px 0;
      font-size: 16px;
    }

    /* Textarea */
    #report-text {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      resize: vertical;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #report-text:focus {
      border-color: var(--primary);
    }

    /* Settings row */
    .settings-row {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .settings-row select {
      flex: 1;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--border);
      color: var(--text);
      background: var(--white);
      outline: none;
      cursor: pointer;
    }

    .settings-row select:focus {
      border-color: var(--primary);
    }

    /* Submit button */
    #submit-btn {
      width: 100%;
      height: 56px;
      margin-top: 16px;
      font-size: 20px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    #submit-btn:hover {
      background: var(--primary-dark);
    }

    #submit-btn:active {
      transform: scale(0.99);
    }

    /* Loading */
    #loading {
      display: none;
      text-align: center;
      padding: 32px 0;
      color: var(--muted);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 14px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Results */
    #results { display: none; }

    .summary-card {
      background: var(--primary-light);
      border-left: 4px solid var(--primary);
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }

    .summary-card h3 {
      color: var(--primary);
      font-size: 18px;
      margin-bottom: 8px;
    }

    #summary-text {
      font-size: 18px;
    }

    /* Section cards */
    .section-card {
      background: var(--white);
      border-radius: 0 8px 8px 0;
      padding: 16px;
      margin-bottom: 12px;
    }

    .section-card.urgency-normal  { border-left: 4px solid var(--success); }
    .section-card.urgency-attention { border-left: 4px solid var(--warning); }
    .section-card.urgency-urgent  { border-left: 4px solid var(--danger); }

    .section-card h4 {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .section-card p {
      font-size: 17px;
      color: var(--text);
    }

    /* Actions */
    #actions-container {
      margin-bottom: 20px;
    }

    #actions-container h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #actions-container ul {
      list-style: none;
      padding: 0;
    }

    #actions-container li {
      padding: 8px 0;
      color: var(--primary);
      font-size: 17px;
      border-bottom: 1px solid var(--border);
    }

    #actions-container li:last-child {
      border-bottom: none;
    }

    /* Reassurance */
    #reassurance-text {
      text-align: center;
      font-style: italic;
      color: var(--muted);
      margin: 20px 0;
      font-size: 17px;
    }

    /* Audio section */
    .audio-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    #main-audio {
      width: 100%;
      margin-top: 8px;
    }

    #no-audio {
      color: var(--warning);
      font-size: 16px;
      margin-top: 8px;
    }

    /* Follow-up */
    #followup-section {
      display: none;
    }

    #followup-section h3 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    .followup-row {
      display: flex;
      gap: 8px;
    }

    #followup-input {
      flex: 1;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }

    #followup-input:focus {
      border-color: var(--primary);
    }

    #mic-btn {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 22px;
      cursor: pointer;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    #mic-btn:hover {
      background: var(--primary-light);
    }

    #ask-btn {
      width: 100%;
      height: 48px;
      margin-top: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 18px;
      font-weight: 600;
      background: var(--primary);
      color: var(--white);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    #ask-btn:hover {
      background: var(--primary-dark);
    }

    #ask-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* Answer area */
    #answer-area {
      display: none;
      margin-top: 16px;
    }

    #answer-text {
      font-size: 18px;
      padding: 16px;
      background: var(--primary-light);
      border-radius: 8px;
      margin-bottom: 10px;
    }

    #answer-audio {
      width: 100%;
    }
  </style>
</head>
<body>
  <div class="container">

    <!-- Header -->
    <div class="header">
      <h1>🩺 MedVoice</h1>
      <p>Your health report, in plain words</p>
    </div>

    <!-- Upload Card -->
    <div class="card">
      <div class="drop-zone" id="drop-zone">
        <span class="drop-icon">📄</span>
        <div class="drop-title">Drop your PDF here</div>
        <div class="drop-sub">or click to browse</div>
        <div class="file-name" id="file-name"></div>
        <input type="file" id="file-input" accept=".pdf" />
      </div>

      <div class="divider">— or type your report below —</div>

      <textarea id="report-text" rows="5" placeholder="Paste your medical report text here..."></textarea>

      <div class="settings-row">
        <select id="voice-select"></select>
        <select id="lang-select">
          <option value="english">English</option>
          <option value="hindi">Hindi</option>
          <option value="telugu">Telugu</option>
        </select>
      </div>

      <button id="submit-btn">Understand My Report 🔊</button>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div>Reading your report...</div>
    </div>

    <!-- Results -->
    <div id="results">
      <div class="summary-card">
        <h3>Summary</h3>
        <p id="summary-text"></p>
      </div>

      <div id="sections-container"></div>

      <div id="actions-container"></div>

      <p id="reassurance-text"></p>

      <div class="card audio-section">
        <h3>Listen to your report</h3>
        <audio id="main-audio" controls></audio>
        <p id="no-audio" style="display:none;">Audio not available — check your Murf API key</p>
      </div>
    </div>

    <!-- Follow-up -->
    <div class="card" id="followup-section">
      <h3>Ask a follow-up question</h3>
      <div class="followup-row">
        <input type="text" id="followup-input" placeholder="e.g. What does hemoglobin mean?" />
        <button id="mic-btn">🎙</button>
      </div>
      <button id="ask-btn">Ask</button>

      <div id="answer-area">
        <p id="answer-text"></p>
        <audio id="answer-audio" controls></audio>
      </div>
    </div>

  </div>

  <script>
 
    const API_BASE = "https://medvoice-06jv.onrender.com";
    const API = API_BASE;

    // --- Voice loading ---
    async function loadVoices() {
      try {
        const res = await fetch(`${API}/voices`);
        const data = await res.json();
        const select = document.getElementById('voice-select');
        select.innerHTML = '';
        data.voices.forEach(voice => {
          const opt = document.createElement('option');
          opt.value = voice.id;
          opt.textContent = voice.name;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error('Could not load voices:', e);
      }
    }

    // --- Drop zone setup ---
    const dropZone = document.getElementById('drop-zone');
    const fileInput = document.getElementById('file-input');
    const fileNameEl = document.getElementById('file-name');

    dropZone.addEventListener('click', () => fileInput.click());

    fileInput.addEventListener('change', () => {
      if (fileInput.files.length > 0) {
        fileNameEl.textContent = '📎 ' + fileInput.files[0].name;
        document.getElementById('report-text').value = '';
      }
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file && file.type === 'application/pdf') {
        const dt = new DataTransfer();
        dt.items.add(file);
        fileInput.files = dt.files;
        fileNameEl.textContent = '📎 ' + file.name;
        document.getElementById('report-text').value = '';
      }
    });

    // --- Process report ---
    async function processReport() {
      const file = fileInput.files[0];
      const text = document.getElementById('report-text').value.trim();

      if (!file && !text) {
        alert('Please upload a PDF or enter your report text');
        return;
      }

      document.getElementById('loading').style.display = 'block';
      document.getElementById('submit-btn').style.display = 'none';
      document.getElementById('results').style.display = 'none';
      document.getElementById('followup-section').style.display = 'none';

      try {
        const form = new FormData();
        if (file) {
          form.append('file', file);
        } else {
          form.append('text', text);
        }
        form.append('language', document.getElementById('lang-select').value);
        form.append('voice_id', document.getElementById('voice-select').value);

        const res = await fetch(`${API}/process-report`, { method: 'POST', body: form });
        const data = await res.json();

        if (!data.success) {
          alert('Error: ' + data.error);
          return;
        }

        // Summary
        document.getElementById('summary-text').textContent = data.report.summary;

        // Sections
        const sectionsEl = document.getElementById('sections-container');
        sectionsEl.innerHTML = '';
        (data.report.sections || []).forEach(section => {
          const card = document.createElement('div');
          card.className = `section-card urgency-${section.urgency || 'normal'}`;
          card.innerHTML = `<h4>${section.title}</h4><p>${section.plain_text}</p>`;
          sectionsEl.appendChild(card);
        });

        // Action items
        const actionsEl = document.getElementById('actions-container');
        actionsEl.innerHTML = '';
        const items = data.report.action_items || [];
        if (items.length > 0) {
          actionsEl.innerHTML = '<h3>What to do next</h3>';
          const ul = document.createElement('ul');
          items.forEach(item => {
            const li = document.createElement('li');
            li.textContent = '✓ ' + item;
            ul.appendChild(li);
          });
          actionsEl.appendChild(ul);
        }

        // Reassurance
        document.getElementById('reassurance-text').textContent = data.report.reassurance || '';

        // Audio
        const mainAudio = document.getElementById('main-audio');
        const noAudio = document.getElementById('no-audio');
        if (data.audio_available) {
          mainAudio.src = 'data:audio/mp3;base64,' + data.audio_base64;
          mainAudio.style.display = 'block';
          noAudio.style.display = 'none';
          mainAudio.play().catch(() => {});
        } else {
          mainAudio.style.display = 'none';
          noAudio.style.display = 'block';
        }

        document.getElementById('results').style.display = 'block';
        document.getElementById('followup-section').style.display = 'block';
        document.getElementById('results').scrollIntoView({ behavior: 'smooth' });

      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        document.getElementById('loading').style.display = 'none';
        document.getElementById('submit-btn').style.display = 'block';
      }
    }

    // --- Ask follow-up ---
    async function askFollowup() {
      const question = document.getElementById('followup-input').value.trim();
      const context = document.getElementById('summary-text').textContent;
      if (!question) return;

      const askBtn = document.getElementById('ask-btn');
      askBtn.disabled = true;
      askBtn.textContent = 'Thinking...';

      try {
        const res = await fetch(`${API}/ask-followup`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question, context }),
        });
        const data = await res.json();

        document.getElementById('answer-text').textContent = data.answer;

        const answerAudio = document.getElementById('answer-audio');
        if (data.audio_available) {
          answerAudio.src = 'data:audio/mp3;base64,' + data.audio_base64;
          answerAudio.style.display = 'block';
          answerAudio.play().catch(() => {});
        } else {
          answerAudio.style.display = 'none';
        }

        document.getElementById('answer-area').style.display = 'block';

      } catch (e) {
        alert('Error: ' + e.message);
      } finally {
        askBtn.disabled = false;
        askBtn.textContent = 'Ask';
      }
    }

    // --- Voice input ---
    function startVoiceInput() {
      const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SpeechRecognition) {
        alert('Voice input not supported in this browser');
        return;
      }
      const micBtn = document.getElementById('mic-btn');
      const recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;

      recognition.onresult = e => {
        document.getElementById('followup-input').value = e.results[0][0].transcript;
      };
      recognition.onend = () => { micBtn.textContent = '🎙'; };
      recognition.onerror = () => { micBtn.textContent = '🎙'; };

      micBtn.textContent = '⏹';
      recognition.start();
    }

    // --- Wire up ---
    document.getElementById('submit-btn').addEventListener('click', processReport);
    document.getElementById('ask-btn').addEventListener('click', askFollowup);
    document.getElementById('mic-btn').addEventListener('click', startVoiceInput);
    document.getElementById('followup-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') askFollowup();
    });

    document.addEventListener('DOMContentLoaded', loadVoices);
  </script>
</body>
</html>
